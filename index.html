<!DOCTYPE html>
<html>
    <head>
        <title>Leaflet web map with Google Sheets</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="css/leaflet.css"/>
        <link rel="stylesheet" href="css/font-awesome.min.css"/>
        <link rel="stylesheet" href="css/leaflet.awesome-markers.css"/>
        <link rel="stylesheet" href="css/leaflet-sidebar.css"/>
        
        <style>
body {
    padding: 0;
    margin: 0;
}
html, body, #map {
    height: 100%;
    width: 100%;
}
#sidebar-content, #sidebar-title {
    word-break: break-word;
    margin-right: 40px;
}
        </style>
    </head>
    <body>
        <div id="map"></div>
        <script src="js/leaflet.js"></script>
        <script src="js/leaflet-sidebar.js"></script>
        <script src="js/leaflet.awesome-markers.min.js"></script>
        <script src="js/papaparse.min.js"></script>
        
        <!-- Αλλάζουμε την έκδοση σε v=99 για να εξαναγκάσουμε τον browser να καθαρίσει την cache -->
        <script src="main.js?v=99"></script>

        <!-- Inline Script που χρησιμοποιεί GET με ασφαλή κατασκευή URL -->
        <script>
            let osmLayerGroup = L.layerGroup();

            function fetchOSMData() {
                // Έλεγχος Zoom: Μόνο από το επίπεδο 15 και πάνω
                if (map.getZoom() < 15) {
                    osmLayerGroup.clearLayers();
                    return;
                }

                osmLayerGroup.clearLayers();
                osmLayerGroup.addTo(map);

                let bounds = map.getBounds();
                let bbox = bounds.getSouth() + "," + bounds.getWest() + "," + bounds.getNorth() + "," + bounds.getEast();
                
                // Το ερώτημα Overpass
                let query = '[out:json][timeout:15];node["amenity"~"cafe|restaurant"](' + bbox + ');out qt;';

                // ΑΣΦΑΛΗΣ ΜΕΘΟΔΟΣ GET: Η κλάση URLSearchParams αναλαμβάνει το σωστό χτίσιμο του URL
                let baseUrl = "https://overpass-api.de";
                let params = new URLSearchParams({ data: query });
                let finalUrl = baseUrl + "?" + params.toString();

                fetch(finalUrl)
                .then(res => {
                    if (!res.ok) throw new Error("API Error");
                    return res.json();
                })
                .then(data => {
                    if (data && data.elements) {
                        data.elements.forEach(element => {
                            if (element.lat && element.lon) {
                                let marker = L.marker([element.lat, element.lon]);
                                let name = element.tags.name || "Κατάστημα Εστίασης";
                                marker.bindPopup("<b>" + name + "</b>");
                                marker.addTo(osmLayerGroup);
                            }
                        });
                    }
                })
                .catch(err => console.error("Σφάλμα Overpass:", err));
            }

            // Κρατάμε και το παλιό όνομα συνάρτησης για περίπτωση που έχει ξεμείνει στη μνήμη
            function loadPublicPOIs() {
                fetchOSMData();
            }
        </script>
    </body>
</html>

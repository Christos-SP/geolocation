<!DOCTYPE html>
<html>
    <head>
        <title>Leaflet web map with Google Sheets</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="css/leaflet.css"/>
        <link rel="stylesheet" href="css/font-awesome.min.css"/>
        <link rel="stylesheet" href="css/leaflet.awesome-markers.css"/>
        <link rel="stylesheet" href="css/leaflet-sidebar.css"/>
        
        <style>
body { padding: 0; margin: 0; }
html, body, #map { height: 100%; width: 100%; }
#sidebar-content, #sidebar-title { word-break: break-word; margin-right: 40px; }
        </style>
    </head>
    <body>
        <div id="map"></div>
        <script src="js/leaflet.js"></script>
        <script src="js/leaflet-sidebar.js"></script>
        <script src="js/leaflet.awesome-markers.min.js"></script>
        <script src="js/papaparse.min.js"></script>
        
        <!-- v=500 για να σβήσει κάθε παλιά ανάμνηση του main.js -->
        <script src="main.js?v=500"></script>

        <!-- Inline Script που εκτελεί POST αίτημα -->
        <script>
            let osmPoiGroup = L.layerGroup();

            function getPublicLocations() {
                if (map.getZoom() < 15) {
                    osmPoiGroup.clearLayers();
                    return;
                }

                osmPoiGroup.clearLayers();
                osmPoiGroup.addTo(map);

                let bounds = map.getBounds();
                let bbox = bounds.getSouth() + "," + bounds.getWest() + "," + bounds.getNorth() + "," + bounds.getEast();
                let query = '[out:json][timeout:15];node["amenity"~"cafe|restaurant"](' + bbox + ');out qt;';

                // ΕΔΩ ΓΙΝΕΤΑΙ Η ΜΕΘΟΔΟΣ POST
                fetch("https://openstreetmap.fr", {
                    method: "POST", // Ορίζουμε τη μέθοδο
                    headers: {
                        "Content-Type": "application/x-www-form-urlencoded" // Δηλώνουμε τη μορφή των δεδομένων
                    },
                    body: "data=" + encodeURIComponent(query) // Στέλνουμε το query κρυμμένο στο σώμα
                })
                .then(res => {
                    if (!res.ok) throw new Error("API Error");
                    return res.json();
                })
                .then(data => {
                    if (data && data.elements) {
                        data.elements.forEach(element => {
                            if (element.lat && element.lon) {
                                let marker = L.marker([element.lat, element.lon]);
                                let name = element.tags.name || "Κατάστημα Εστίασης";
                                marker.bindPopup("<b>" + name + "</b>");
                                marker.addTo(osmPoiGroup);
                            }
                        });
                    }
                })
                .catch(err => console.error("Σφάλμα Overpass:", err));
            }
        </script>
    </body>
</html>

<!DOCTYPE html>
<html>
    <head>
        <title>Leaflet web map with Google Sheets</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="css/leaflet.css"/>
        <link rel="stylesheet" href="css/font-awesome.min.css"/>
        <link rel="stylesheet" href="css/leaflet.awesome-markers.css"/>
        <link rel="stylesheet" href="css/leaflet-sidebar.css"/>
        
        <style>
body {
    padding: 0;
    margin: 0;
}
html, body, #map {
    height: 100%;
    width: 100%;
}
#sidebar-content, #sidebar-title {
    word-break: break-word;
    margin-right: 40px;
}
        </style>
    </head>
    <body>
        <div id="map"></div>
        <script src="js/leaflet.js"></script>
        <script src="js/leaflet-sidebar.js"></script>
        <script src="js/leaflet.awesome-markers.min.js"></script>
        <script src="js/papaparse.min.js"></script>
        
        <!-- Ανεβάζουμε την έκδοση στο v=10 για να σπάσουμε οριστικά το cache του GitHub -->
        <script src="main.js?v=10"></script>

        <!-- Inline Script που διορθώνει το URL ακόμα κι αν ο browser τρέχει παλιό κώδικα -->
        <script>
            let poiLayerGroup = L.layerGroup();
            let osmLayerGroup = L.layerGroup();

            function executeOverpassFetch(layerGroup) {
                if (map.getZoom() < 15) {
                    layerGroup.clearLayers();
                    return;
                }

                layerGroup.clearLayers();
                layerGroup.addTo(map);

                let bounds = map.getBounds();
                let bbox = bounds.getSouth() + "," + bounds.getWest() + "," + bounds.getNorth() + "," + bounds.getEast();
                
                // Το ερώτημα
                let query = '[out:json][timeout:15];node["amenity"~"cafe|restaurant"](' + bbox + ');out qt;';
                
                // ΔΙΟΡΘΩΣΗ: Πλήρες και σωστό URL με το overpass. μπροστά και το /api/interpreter/ στο τέλος
                let finalUrl = "https://openstreetmap.fr" + encodeURIComponent(query);

                fetch(finalUrl)
                .then(res => {
                    if (!res.ok) throw new Error("API Error");
                    return res.json();
                })
                .then(data => {
                    if (data && data.elements) {
                        data.elements.forEach(element => {
                            if (element.lat && element.lon) {
                                let marker = L.marker([element.lat, element.lon]);
                                let name = element.tags.name || "Κατάστημα Εστίασης";
                                marker.bindPopup("<b>" + name + "</b>");
                                marker.addTo(layerGroup);
                            }
                        });
                    }
                })
                .catch(err => console.error("Σφάλμα Overpass:", err));
            }

            // Καλύπτουμε και τα δύο ονόματα συναρτήσεων για σιγουριά
            function loadPublicPOIs() {
                executeOverpassFetch(poiLayerGroup);
            }

            function fetchOSMData() {
                executeOverpassFetch(osmLayerGroup);
            }
        </script>
    </body>
</html>
